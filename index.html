<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outfo - Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      color: #374151;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { text-align: center; }
    .logo {
      font-size: 40px;
      font-weight: 800;
      color: #0F172B;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 15px;
      color: #9CA3AF;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    a {
      display: block;
      width: 280px;
      padding: 14px 24px;
      background: #F9FAFB;
      border: 1px solid #E5E7EB;
      border-radius: 12px;
      color: #1F2937;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.15s;
    }
    a:hover {
      background: #F3F4F6;
      border-color: #D1D5DB;
    }
    .contact {
      margin-top: 48px;
      font-size: 13px;
      color: #9CA3AF;
    }
    .contact a {
      display: inline;
      width: auto;
      padding: 0;
      background: none;
      border: none;
      color: #1877F2;
      font-size: 13px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Outfo</div>
    <p class="subtitle">Fashion Outfit Sharing Platform</p>
    <div class="links">
      <a href="privacy.html">隱私權政策 Privacy Policy</a>
      <a href="terms.html">使用條款 Terms of Service</a>
    </div>
    <p class="contact">
      聯絡我們 Contact: <a href="mailto:outfoapp@gmail.com">outfoapp@gmail.com</a>
    </p>
  </div>
</body>
</html>
